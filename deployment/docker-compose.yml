# ============================================================
# docker-compose.yml: VLM + LoRA Agentic RAG
# 
# Usage:
#   docker-compose up --build
#   docker-compose down
# ============================================================

version: '3.8'

services:
  vlm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlm-agentic-rag-api
    
    # GPU設定（NVIDIA Docker対応）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # ポートマッピング
    ports:
      - "8000:8000"
    
    # ボリュームマウント
    volumes:
      - ./uploads:/tmp/uploads  # ファイルアップロード領域
      - ./logs:/app/logs        # ログ出力
      - ./models:/models        # モデルキャッシュ
    
    # 環境変数
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TRANSFORMERS_CACHE=/models
      - HF_HOME=/models
    
    # 再起動ポリシー
    restart: unless-stopped
    
    # リソース制限
    mem_limit: 16g
    memswap_limit: 16g
    
    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# Networks (複数サービス構成時)
# ============================================================

networks:
  default:
    name: vlm-network
    driver: bridge
